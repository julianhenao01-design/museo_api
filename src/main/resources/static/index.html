<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Museo Digital | Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0f172a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .tab-active { background: rgba(245, 158, 11, 0.1); border-left: 4px solid #f59e0b; }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<div id="loginSection" class="w-full max-w-md glass p-8 rounded-3xl shadow-2xl">
    <h1 class="text-3xl font-bold text-center mb-2 text-amber-500">MUSEO ADMIN</h1>
    <p class="text-slate-400 text-center mb-8 text-sm font-medium uppercase tracking-widest">Panel de Control</p>
    <form id="loginForm" class="space-y-4">
        <input type="text" id="user" placeholder="Usuario" required class="w-full p-4 rounded-xl bg-slate-900/50 border border-white/10 outline-none focus:border-amber-500 transition-all">
        <input type="password" id="pass" placeholder="Contraseña" required class="w-full p-4 rounded-xl bg-slate-900/50 border border-white/10 outline-none focus:border-amber-500 transition-all">
        <button type="submit" class="w-full bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold p-4 rounded-xl transition-all transform hover:scale-[1.02]">Ingresar</button>
    </form>
</div>

<div id="dashboardSection" class="w-full max-w-6xl glass rounded-3xl overflow-hidden flex flex-col md:flex-row hidden min-h-[80vh]">
    <nav class="w-full md:w-64 bg-slate-900/50 p-6 flex flex-col gap-2 border-r border-white/5">
        <div class="mb-8 p-2">
            <h2 class="text-xl font-bold text-amber-500">MUSEO ADMIN</h2>
        </div>
        <button id="btn-users" onclick="showTab('users')" class="flex items-center gap-3 p-4 rounded-xl text-slate-400 hover:text-white transition-all font-semibold">Usuarios</button>
        <button id="btn-guides" onclick="showTab('guides')" class="flex items-center gap-3 p-4 rounded-xl text-slate-400 hover:text-white transition-all font-semibold">Guías</button>
        <button id="btn-art" onclick="showTab('art')" class="flex items-center gap-3 p-4 rounded-xl text-slate-400 hover:text-white transition-all font-semibold">Exhibiciones</button>
        <div class="mt-auto pt-6 border-t border-white/5">
            <button onclick="location.reload()" class="w-full text-left p-4 text-slate-500 hover:text-red-400 text-sm transition-all font-medium">Cerrar Sesión</button>
        </div>
    </nav>

    <main class="flex-1 p-8 overflow-y-auto bg-slate-900/20">
        <header class="mb-10">
            <h2 id="tabTitle" class="text-4xl font-bold mb-2">Gestión</h2>
            <p id="tabDesc" class="text-slate-400 font-medium"></p>
        </header>

        <div class="grid lg:grid-cols-3 gap-8">
            <div class="glass p-6 rounded-2xl h-fit border-white/5 shadow-xl">
                <h3 class="text-lg font-bold mb-6 text-amber-500">Nuevo Registro</h3>
                <form id="masterForm" class="space-y-5">
                    <div id="formInputs" class="space-y-4"></div>
                    <button type="submit" class="w-full bg-amber-500/10 hover:bg-amber-500 text-amber-500 hover:text-slate-900 border border-amber-500/50 font-bold p-4 rounded-xl transition-all">Guardar en DB</button>
                </form>
            </div>

            <div class="lg:col-span-2 glass rounded-2xl overflow-hidden border-white/5 shadow-xl bg-slate-900/40">
                <table class="w-full text-sm">
                    <thead class="bg-white/5 text-slate-400">
                    <tr id="tableHeader"></tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-white/5"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script>
    let currentTab = 'users';
    let editingId = null; // Variable para saber si estamos editando

    const CONFIG = {
        users: { title: "Usuarios", desc: "Lista de visitantes y administradores", url: "/api/user", fields: ['name', 'email'], labels: ['Nombre', 'Email'] },
        guides: { title: "Guías", desc: "Gestión de personal de guía", url: "/api/guide", fields: ['name', 'specialty'], labels: ['Nombre', 'Especialidad'] },
        art: { title: "Exhibiciones", desc: "Catálogo de obras y exposiciones", url: "/api/exhibition", fields: ['title', 'artist', 'year'], labels: ['Obra', 'Artista', 'Año'] }
    };

    document.getElementById('loginForm').onsubmit = (e) => {
        e.preventDefault();
        if(document.getElementById('user').value === 'admin' && document.getElementById('pass').value === '1234') {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('dashboardSection').classList.remove('hidden');
            showTab('users');
        } else { alert('Credenciales incorrectas'); }
    };

    function showTab(tab) {
        currentTab = tab;
        cancelEdit(); // Limpiar si estábamos editando algo
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active', 'text-amber-500'));
        document.getElementById(`btn-${tab}`).classList.add('tab-active', 'text-amber-500');
        document.getElementById('tabTitle').innerText = `Gestión de ${CONFIG[tab].title}`;
        document.getElementById('tabDesc').innerText = CONFIG[tab].desc;
        renderForm();
        loadData();
    }

    function renderForm() {
        const container = document.getElementById('formInputs');
        container.innerHTML = CONFIG[currentTab].fields.map((f, i) => `
            <div>
                <label class="text-[10px] uppercase text-slate-500 ml-1 font-bold">${CONFIG[currentTab].labels[i]}</label>
                <input type="text" id="input-${f}" required class="w-full p-3 rounded-lg bg-slate-900/50 border border-white/10 text-sm outline-none focus:border-amber-500 transition-all text-white">
            </div>
        `).join('');
    }

    async function loadData() {
        try {
            const res = await fetch(CONFIG[currentTab].url);
            const data = await res.json();

            document.getElementById('tableHeader').innerHTML = CONFIG[currentTab].labels.map(l => `<th class="p-4 text-left">${l}</th>`).join('') + '<th class="p-4 text-right">Acciones</th>';

            const tbody = document.getElementById('tableBody');
            if (!data.length) {
                tbody.innerHTML = '<tr><td colspan="100%" class="p-8 text-center text-slate-500">No hay datos registrados aún</td></tr>';
                return;
            }

            tbody.innerHTML = data.map(item => `
                <tr class="hover:bg-white/5 transition-colors">
                    ${CONFIG[currentTab].fields.map(f => `<td class="p-4 text-slate-300 font-medium">${item[f] || '---'}</td>`).join('')}
                    <td class="p-4 text-right flex justify-end gap-2">
                        <button onclick='prepareEdit(${JSON.stringify(item)})' class="bg-blue-500/10 hover:bg-blue-500 text-blue-500 hover:text-white px-3 py-1 rounded-md text-[10px] font-bold transition-all border border-blue-500/20">
                            EDITAR
                        </button>
                        <button onclick="deleteItem(${item.id})" class="bg-red-500/10 hover:bg-red-500 text-red-500 hover:text-white px-3 py-1 rounded-md text-[10px] font-bold transition-all border border-red-500/20">
                            BORRAR
                        </button>
                    </td>
                </tr>
            `).join('');
        } catch (e) {
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="100%" class="p-4 text-center text-red-400 italic">Error al conectar con la base de datos</td></tr>';
        }
    }

    // NUEVA FUNCIÓN: Prepara el formulario para editar
    function prepareEdit(item) {
        editingId = item.id;
        CONFIG[currentTab].fields.forEach(f => {
            document.getElementById(`input-${f}`).value = item[f];
        });

        const btn = document.querySelector('#masterForm button[type="submit"]');
        btn.innerText = "ACTUALIZAR DATOS";
        btn.classList.replace('text-amber-500', 'text-blue-400');
        btn.classList.replace('border-amber-500/50', 'border-blue-500/50');
    }

    function cancelEdit() {
        editingId = null;
        const form = document.getElementById('masterForm');
        if(form) form.reset();
        const btn = document.querySelector('#masterForm button[type="submit"]');
        if(btn) {
            btn.innerText = "GUARDAR EN DB";
            btn.classList.replace('text-blue-400', 'text-amber-500');
            btn.classList.replace('border-blue-500/50', 'border-amber-500/50');
        }
    }

    async function deleteItem(id) {
        if (!confirm('¿Seguro que quieres borrar este registro?')) return;
        try {
            const res = await fetch(`${CONFIG[currentTab].url}/${id}`, { method: 'DELETE' });
            if (res.ok) loadData();
        } catch (error) { alert('Error de conexión'); }
    }

    document.getElementById('masterForm').onsubmit = async (e) => {
        e.preventDefault();
        const payload = {};
        // Si estamos editando, incluimos el ID en el cuerpo del JSON
        if(editingId) payload.id = editingId;

        CONFIG[currentTab].fields.forEach(f => payload[f] = document.getElementById(`input-${f}`).value);

        const method = editingId ? 'PUT' : 'POST';
        const url = editingId ? `${CONFIG[currentTab].url}/${editingId}` : CONFIG[currentTab].url;

        try {
            const res = await fetch(url, {
                method: method,
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if(res.ok) {
                cancelEdit();
                loadData();
            } else {
                alert('Error en la operación');
            }
        } catch (err) {
            alert('Error de red');
        }
    };
</script>
</body>
</html>
