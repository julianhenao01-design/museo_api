<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Museo Digital | Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

<div id="loginSection" class="glass w-full max-w-md p-8 rounded-3xl shadow-2xl text-center transition-all">
    <h1 class="text-3xl font-bold mb-2 text-amber-500 text-amber-500">MUSEO ADMIN</h1>
    <p class="text-slate-400 text-sm mb-8">Ingresa tus credenciales de acceso</p>

    <form id="loginForm" class="space-y-4">
        <input type="text" id="user" placeholder="Usuario" class="w-full p-4 rounded-xl bg-slate-900/50 border border-white/10 focus:border-amber-500 outline-none transition-all">
        <input type="password" id="pass" placeholder="Contraseña" class="w-full p-4 rounded-xl bg-slate-900/50 border border-white/10 focus:border-amber-500 outline-none transition-all">
        <button type="submit" class="w-full py-4 bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold rounded-xl shadow-lg transition-all">
            Iniciar Sesión
        </button>
    </form>
    <p id="loginError" class="text-red-400 text-xs mt-4 hidden">Credenciales incorrectas. Intenta de nuevo.</p>
</div>

<div id="dashboardSection" class="glass w-full max-w-5xl p-8 rounded-3xl shadow-2xl hidden transition-all">
    <div class="flex justify-between items-center mb-8">
        <div>
            <h2 class="text-2xl font-bold text-amber-500">Gestión de Usuarios</h2>
            <p class="text-slate-400 text-xs">Conectado a: Railway API</p>
        </div>
        <button onclick="logout()" class="text-xs bg-red-500/20 text-red-400 px-4 py-2 rounded-lg hover:bg-red-500/40 transition-all">Cerrar Sesión</button>
    </div>

    <div class="grid md:grid-cols-3 gap-8">
        <div class="bg-slate-900/40 p-6 rounded-2xl border border-white/5">
            <h3 class="text-lg font-semibold mb-4">Añadir Nuevo</h3>
            <div class="space-y-3">
                <input type="text" id="newName" placeholder="Nombre completo" class="w-full p-3 rounded-lg bg-slate-800 border border-white/10 text-sm outline-none">
                <input type="email" id="newEmail" placeholder="Correo electrónico" class="w-full p-3 rounded-lg bg-slate-800 border border-white/10 text-sm outline-none">
                <button onclick="addUser()" class="w-full py-3 bg-blue-600 hover:bg-blue-700 text-white font-bold rounded-lg transition-all">
                    Registrar Usuario
                </button>
            </div>
        </div>

        <div class="md:col-span-2 overflow-x-auto">
            <table class="w-full text-left">
                <thead>
                <tr class="text-slate-500 border-b border-white/5 text-sm">
                    <th class="pb-3">ID</th>
                    <th class="pb-3">Nombre</th>
                    <th class="pb-3">Email</th>
                </tr>
                </thead>
                <tbody id="userTableBody" class="text-sm">
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // --- LÓGICA DE LOGIN ---
    const loginForm = document.getElementById('loginForm');
    loginForm.onsubmit = (e) => {
        e.preventDefault();
        const user = document.getElementById('user').value;
        const pass = document.getElementById('pass').value;

        if(user === 'admin' && pass === '1234') { // Cambia esto si quieres
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('dashboardSection').classList.remove('hidden');
            loadUsers();
        } else {
            document.getElementById('loginError').classList.remove('hidden');
        }
    };

    function logout() {
        location.reload();
    }

    // --- LÓGICA DE API (FETCH) ---
    const API_URL = '/api/users';

    // 1. Obtener usuarios
    async function loadUsers() {
        try {
            const response = await fetch(API_URL);
            const users = await response.json();
            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = '';

            users.forEach(u => {
                tbody.innerHTML += `
                    <tr class="border-b border-white/5 hover:bg-white/5 transition-colors">
                        <td class="py-4 text-slate-500">${u.id}</td>
                        <td class="py-4 font-semibold">${u.name}</td>
                        <td class="py-4 text-slate-400">${u.email}</td>
                    </tr>
                `;
            });
        } catch (error) {
            console.error('Error cargando usuarios:', error);
        }
    }

    // 2. Agregar usuario
    async function addUser() {
        const name = document.getElementById('newName').value;
        const email = document.getElementById('newEmail').value;

        if(!name || !email) return alert('Llena todos los campos');

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email })
            });

            if(response.ok) {
                alert('¡Usuario guardado!');
                document.getElementById('newName').value = '';
                document.getElementById('newEmail').value = '';
                loadUsers(); // Recargar tabla
            }
        } catch (error) {
            alert('Error al conectar con la API');
        }
    }
</script>
</body>
</html>
