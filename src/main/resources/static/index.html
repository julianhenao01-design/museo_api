<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Museo Digital | Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #f8fafc; overflow-x: hidden; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .tab-active { border-left: 4px solid #f59e0b; background: rgba(245, 158, 11, 0.1); color: #f59e0b; }
        .hidden { display: none; }
        input::placeholder { color: #64748b; }
    </style>
</head>
<body class="min-h-screen">

<div id="loginSection" class="min-h-screen flex items-center justify-center p-4">
    <div class="glass w-full max-w-md p-8 rounded-3xl shadow-2xl text-center">
        <h1 class="text-3xl font-bold mb-2 text-amber-500">MUSEO CMS</h1>
        <p class="text-slate-400 text-sm mb-8">Credenciales de Administrador</p>
        <form id="loginForm" class="space-y-4">
            <input type="text" id="user" placeholder="Usuario" class="w-full p-4 rounded-xl bg-slate-900/50 border border-white/10 outline-none focus:border-amber-500 transition-all">
            <input type="password" id="pass" placeholder="Contraseña" class="w-full p-4 rounded-xl bg-slate-900/50 border border-white/10 outline-none focus:border-amber-500 transition-all">
            <button type="submit" class="w-full py-4 bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold rounded-xl shadow-lg transition-all">Entrar al Sistema</button>
        </form>
    </div>
</div>

<div id="dashboardSection" class="hidden min-h-screen flex flex-col md:flex-row">

    <aside class="w-full md:w-64 glass border-r border-white/5 p-6 space-y-8">
        <h2 class="text-xl font-extrabold text-amber-500 tracking-tighter">MUSEO ADMIN</h2>
        <nav class="space-y-2 text-sm font-semibold text-slate-400">
            <button onclick="showTab('users')" id="btn-users" class="tab-active w-full text-left p-3 rounded-lg transition-all flex items-center gap-3">👥 Usuarios</button>
            <button onclick="showTab('guides')" id="btn-guides" class="w-full text-left p-3 rounded-lg hover:bg-white/5 transition-all flex items-center gap-3">🧥 Guías</button>
            <button onclick="showTab('art')" id="btn-art" class="w-full text-left p-3 rounded-lg hover:bg-white/5 transition-all flex items-center gap-3">🖼️ Exhibiciones</button>
            <hr class="border-white/5 my-4">
            <button onclick="location.reload()" class="w-full text-left p-3 text-red-400 hover:bg-red-500/10 rounded-lg">Cerrar Sesión</button>
        </nav>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">
        <div class="mb-8">
            <h1 id="tabTitle" class="text-3xl font-bold">Gestión de Usuarios</h1>
            <p id="tabDesc" class="text-slate-400 text-sm">Administración de acceso y perfiles</p>
        </div>

        <div class="grid lg:grid-cols-3 gap-8">
            <div class="glass p-6 rounded-2xl border border-white/5 h-fit">
                <h3 class="text-lg font-semibold mb-4 text-amber-500/80">Nuevo Registro</h3>
                <form id="masterForm" class="space-y-4">
                    <div id="formInputs" class="space-y-3"></div>
                    <button type="submit" class="w-full py-3 bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold rounded-lg shadow-lg transition-all mt-4">
                        Guardar en DB
                    </button>
                </form>
            </div>

            <div class="lg:col-span-2 glass rounded-2xl overflow-hidden border border-white/5">
                <div class="overflow-x-auto">
                    <table class="w-full text-left">
                        <thead class="bg-white/5 text-slate-400 text-xs uppercase tracking-widest">
                        <tr id="tableHeader"></tr>
                        </thead>
                        <tbody id="tableBody" class="text-sm"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    let currentTab = 'users';

    // CONFIGURACIÓN CORREGIDA: Sincronizada con tus controllers de Java
    const CONFIG = {
        users: {
            title: "Usuarios",
            desc: "Lista de visitantes y administradores",
            url: "/api/user", // Coincide con @RequestMapping("/api/user")
            fields: ['name', 'email'],
            labels: ['Nombre', 'Email']
        },
        guides: {
            title: "Guías",
            desc: "Personal especializado en recorridos",
            url: "/api/guide", // Coincide con @RequestMapping("/api/guide")
            fields: ['name', 'specialty'],
            labels: ['Nombre del Guía', 'Especialidad']
        },
        art: {
            title: "Exhibiciones",
            desc: "Obras de arte y piezas históricas",
            url: "/api/exhibition", // Coincide con @RequestMapping("/api/exhibition")
            fields: ['title', 'artist', 'year'],
            labels: ['Título de Obra', 'Artista', 'Año']
        }
    };

    document.getElementById('loginForm').onsubmit = (e) => {
        e.preventDefault();
        if(document.getElementById('user').value === 'admin' && document.getElementById('pass').value === '1234') {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('dashboardSection').classList.remove('hidden');
            showTab('users');
        } else { alert('Credenciales incorrectas'); }
    };

    function showTab(tab) {
        currentTab = tab;
        document.querySelectorAll('nav button').forEach(b => {
            b.classList.remove('tab-active', 'text-amber-500');
            b.classList.add('text-slate-400');
        });
        document.getElementById(`btn-${tab}`).classList.add('tab-active', 'text-amber-500');

        document.getElementById('tabTitle').innerText = `Gestión de ${CONFIG[tab].title}`;
        document.getElementById('tabDesc').innerText = CONFIG[tab].desc;

        document.getElementById('tableBody').innerHTML = '<tr><td colspan="4" class="p-4 text-center text-slate-500 italic">Cargando registros...</td></tr>';

        renderForm();
        loadData();
    }

    function renderForm() {
        const container = document.getElementById('formInputs');
        container.innerHTML = CONFIG[currentTab].fields.map((f, i) => `
            <div>
                <label class="text-[10px] uppercase text-slate-500 ml-1 font-bold">${CONFIG[currentTab].labels[i]}</label>
                <input type="text" id="input-${f}" required
                class="w-full p-3 rounded-lg bg-slate-900/50 border border-white/10 text-sm outline-none focus:border-amber-500 transition-all">
            </div>
        `).join('');
    }

    async function loadData() {
        try {
            const res = await fetch(CONFIG[currentTab].url);
            if (!res.ok) throw new Error('Error en la red');
            const data = await res.json();

            document.getElementById('tableHeader').innerHTML = CONFIG[currentTab].labels.map(l => `<th class="p-4">${l}</th>`).join('') + `<th class="p-4 text-right">Status</th>`;

            const tbody = document.getElementById('tableBody');
            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="100%" class="p-8 text-center text-slate-500">No hay datos registrados aún</td></tr>';
                return;
            }

            tbody.innerHTML = data.map(item => `
                <tr class="border-b border-white/5 hover:bg-white/5 transition-colors">
                    ${CONFIG[currentTab].fields.map(f => `<td class="p-4 text-slate-300 font-medium">${item[f] || '---'}</td>`).join('')}
                    <td class="p-4 text-right text-[10px] text-green-500 font-bold uppercase tracking-widest">En DB</td>
                </tr>
            `).join('');
        } catch (e) {
            console.error("Error al cargar:", e);
            document.getElementById('tableBody').innerHTML = '<tr><td colspan="100%" class="p-4 text-center text-red-400">Error: No se encontró la ruta ' + CONFIG[currentTab].url + '</td></tr>';
        }
    }

    document.getElementById('masterForm').onsubmit = async (e) => {
        e.preventDefault();
        const payload = {};
        CONFIG[currentTab].fields.forEach(f => {
            payload[f] = document.getElementById(`input-${f}`).value;
        });

        try {
            const res = await fetch(CONFIG[currentTab].url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if(res.ok) {
                alert(`¡${CONFIG[currentTab].title} guardado con éxito!`);
                e.target.reset();
                loadData();
            } else {
                alert('Error al guardar. Revisa que el servidor esté encendido.');
            }
        } catch (err) {
            alert('Error de red al intentar guardar.');
        }
    };
</script>
</body>
</html>
