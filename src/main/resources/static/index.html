<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Museo Digital | Sistema de Gestión</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .tab-active { border-left: 4px solid #f59e0b; background: rgba(245, 158, 11, 0.1); color: #f59e0b; }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen">

<div id="loginSection" class="min-h-screen flex items-center justify-center p-4">
    <div class="glass w-full max-w-md p-8 rounded-3xl shadow-2xl text-center">
        <h1 class="text-3xl font-bold mb-2 text-amber-500">MUSEO CMS</h1>
        <p class="text-slate-400 text-sm mb-8">Credenciales de Administrador</p>
        <form id="loginForm" class="space-y-4">
            <input type="text" id="user" placeholder="Usuario" class="w-full p-4 rounded-xl bg-slate-900/50 border border-white/10 outline-none">
            <input type="password" id="pass" placeholder="Contraseña" class="w-full p-4 rounded-xl bg-slate-900/50 border border-white/10 outline-none">
            <button type="submit" class="w-full py-4 bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold rounded-xl transition-all">Entrar al Sistema</button>
        </form>
    </div>
</div>

<div id="dashboardSection" class="hidden min-h-screen flex flex-col md:flex-row">

    <aside class="w-full md:w-64 glass border-r border-white/5 p-6 space-y-8">
        <h2 class="text-xl font-extrabold text-amber-500 tracking-tighter">MUSEO ADMIN</h2>
        <nav class="space-y-2 text-sm font-semibold">
            <button onclick="showTab('users')" id="btn-users" class="tab-active w-full text-left p-3 rounded-lg transition-all">👥 Usuarios</button>
            <button onclick="showTab('guides')" id="btn-guides" class="w-full text-left p-3 rounded-lg hover:bg-white/5 transition-all text-slate-400">🧥 Guías</button>
            <button onclick="showTab('art')" id="btn-art" class="w-full text-left p-3 rounded-lg hover:bg-white/5 transition-all text-slate-400">🖼️ Obras de Arte</button>
            <hr class="border-white/5 my-4">
            <button onclick="location.reload()" class="w-full text-left p-3 text-red-400 hover:bg-red-500/10 rounded-lg">Cerrar Sesión</button>
        </nav>
    </aside>

    <main class="flex-1 p-8 overflow-y-auto">

        <div class="mb-8">
            <h1 id="tabTitle" class="text-3xl font-bold">Gestión de Usuarios</h1>
            <p class="text-slate-400 text-sm">Control central de activos del museo</p>
        </div>

        <div class="grid lg:grid-cols-3 gap-8">
            <div class="glass p-6 rounded-2xl border border-white/5 h-fit">
                <h3 class="text-lg font-semibold mb-4">Registro Rápido</h3>
                <form id="masterForm" class="space-y-3">
                    <div id="formInputs"></div>
                    <button type="submit" class="w-full py-3 bg-amber-500 hover:bg-amber-600 text-slate-900 font-bold rounded-lg transition-all">Guardar en Base de Datos</button>
                </form>
            </div>

            <div class="lg:col-span-2 glass rounded-2xl overflow-hidden border border-white/5">
                <table class="w-full text-left">
                    <thead class="bg-white/5 text-slate-400 text-xs uppercase tracking-widest">
                    <tr id="tableHeader"></tr>
                    </thead>
                    <tbody id="tableBody" class="text-sm"></tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script>
    let currentTab = 'users';
    const CONFIG = {
        users: { title: "Usuarios", url: "/api/users", fields: ['name', 'email'], labels: ['Nombre', 'Correo'] },
        guides: { title: "Guías", url: "/api/guides", fields: ['name', 'specialty'], labels: ['Nombre', 'Especialidad'] },
        art: { title: "Obras de Arte", url: "/api/exhibitions", fields: ['title', 'artist', 'year'], labels: ['Título', 'Artista', 'Año'] }
    };

    // LOGIN SIMPLE
    document.getElementById('loginForm').onsubmit = (e) => {
        e.preventDefault();
        if(document.getElementById('user').value === 'admin' && document.getElementById('pass').value === '1234') {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('dashboardSection').classList.remove('hidden');
            showTab('users');
        }
    };

    // CAMBIAR PESTAÑAS
    function showTab(tab) {
        currentTab = tab;
        document.querySelectorAll('nav button').forEach(b => b.classList.remove('tab-active', 'text-amber-500'));
        document.getElementById(`btn-${tab}`).classList.add('tab-active');
        document.getElementById('tabTitle').innerText = `Gestión de ${CONFIG[tab].title}`;

        renderForm();
        loadData();
    }

    // RENDERIZAR FORMULARIO
    function renderForm() {
        const container = document.getElementById('formInputs');
        container.innerHTML = CONFIG[currentTab].fields.map((f, i) => `
            <input type="text" id="input-${f}" placeholder="${CONFIG[currentTab].labels[i]}"
            class="w-full p-3 rounded-lg bg-slate-800 border border-white/10 text-sm outline-none focus:border-amber-500">
        `).join('');
    }

    // CARGAR DATOS
    async function loadData() {
        const res = await fetch(CONFIG[currentTab].url);
        const data = await res.json();

        // Header
        document.getElementById('tableHeader').innerHTML = CONFIG[currentTab].labels.map(l => `<th class="p-4">${l}</th>`).join('') + `<th class="p-4 text-right">Acción</th>`;

        // Body
        document.getElementById('tableBody').innerHTML = data.map(item => `
            <tr class="border-b border-white/5 hover:bg-white/5">
                ${CONFIG[currentTab].fields.map(f => `<td class="p-4 text-slate-300">${item[f] || 'N/A'}</td>`).join('')}
                <td class="p-4 text-right"><button class="text-red-400 hover:underline text-xs">Eliminar</button></td>
            </tr>
        `).join('');
    }

    // GUARDAR DATOS (POST)
    document.getElementById('masterForm').onsubmit = async (e) => {
        e.preventDefault();
        const payload = {};
        CONFIG[currentTab].fields.forEach(f => {
            payload[f] = document.getElementById(`input-${f}`).value;
        });

        const res = await fetch(CONFIG[currentTab].url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if(res.ok) {
            alert('¡Guardado con éxito!');
            loadData();
            e.target.reset();
        } else {
            alert('Error al guardar. Verifica la Entidad en Java.');
        }
    };
</script>
</body>
</html>
